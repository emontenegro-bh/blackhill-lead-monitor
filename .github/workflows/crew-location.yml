name: Crew Location Report

on:
  schedule:
    # 21:00 UTC = 4:00pm CDT (summer) / 3:00pm CST (winter). One fast API call,
    # so the email lands at ~4pm Central (summer). Weekdays only.
    - cron: '0 21 * * 1-5'
  workflow_dispatch:
    inputs:
      to:
        description: 'Override email recipients (comma-separated). Blank = default (evelin + denisse).'
        required: false
        default: ''
      skip_teams:
        description: 'Skip posting to Teams (email only) — useful for tests.'
        type: boolean
        required: false
        default: false

concurrency:
  group: crew-location
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Send crew location report
        env:
          AZUGA_API_KEY: ${{ secrets.AZUGA_API_KEY }}
          TEAMS_WEBHOOK_URL: ${{ github.event.inputs.skip_teams == 'true' && '' || secrets.TEAMS_WEBHOOK_URL }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          CREW_LOC_TO: ${{ github.event.inputs.to }}
        run: python scripts/crew-location.py

  notify-failure:
    needs: [report]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      workflow_name: "Crew Location Report"
    secrets: inherit
