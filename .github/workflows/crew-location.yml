name: Crew Location Report

on:
  # Primary trigger: an external cron service (cron-job.org) POSTs a
  # repository_dispatch at ~3:55pm Central on weekdays. On-demand dispatches run
  # within seconds, so they avoid GitHub's unreliable *scheduled*-job queue that
  # was delaying / dropping the 4pm email. See repo README for the cron-job setup.
  repository_dispatch:
    types: [crew-location-report]
  # INTERIM safety net (re-added 2026-06-21): GitHub schedules drift late / get
  # skipped, but this guarantees the report fires while the reliable cron-job.org
  # external trigger is being set up. REMOVE this schedule block once cron-job.org
  # is confirmed delivering, to avoid duplicate emails. 20:37 UTC = 3:37pm CDT.
  schedule:
    - cron: '37 20 * * 1-5'
  workflow_dispatch:
    inputs:
      to:
        description: 'Override email recipients (comma-separated). Blank = default (evelin + denisse).'
        required: false
        default: ''
      skip_teams:
        description: 'Skip posting to Teams (email only) — useful for tests.'
        type: boolean
        required: false
        default: false

concurrency:
  group: crew-location
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Send crew location report
        env:
          AZUGA_API_KEY: ${{ secrets.AZUGA_API_KEY }}
          TEAMS_WEBHOOK_URL: ${{ github.event.inputs.skip_teams != 'true' && secrets.TEAMS_WEBHOOK_URL || '' }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          CREW_LOC_TO: ${{ github.event.inputs.to }}
        run: python scripts/crew-location.py

  notify-failure:
    needs: [report]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      workflow_name: "Crew Location Report"
    secrets: inherit
