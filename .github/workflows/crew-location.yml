name: Crew Location Report

on:
  schedule:
    # 20:43 UTC = 3:43pm CDT (summer) / 2:43pm CST (winter). Runs ~17 min early
    # on an off-the-hour minute to dodge GitHub's top-of-hour scheduler congestion
    # (which was delaying delivery to ~6pm), so the email lands by ~4pm Central.
    # Weekdays only.
    - cron: '43 20 * * 1-5'
  workflow_dispatch:
    inputs:
      to:
        description: 'Override email recipients (comma-separated). Blank = default (evelin + denisse).'
        required: false
        default: ''
      skip_teams:
        description: 'Skip posting to Teams (email only) — useful for tests.'
        type: boolean
        required: false
        default: false

concurrency:
  group: crew-location
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Send crew location report
        env:
          AZUGA_API_KEY: ${{ secrets.AZUGA_API_KEY }}
          TEAMS_WEBHOOK_URL: ${{ github.event.inputs.skip_teams != 'true' && secrets.TEAMS_WEBHOOK_URL || '' }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          CREW_LOC_TO: ${{ github.event.inputs.to }}
        run: python scripts/crew-location.py

  notify-failure:
    needs: [report]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      workflow_name: "Crew Location Report"
    secrets: inherit
