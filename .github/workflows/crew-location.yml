name: Crew Location Report

on:
  # Primary trigger: an external cron service (cron-job.org) POSTs a
  # repository_dispatch at ~3:55pm Central on weekdays. On-demand dispatches run
  # within seconds, so they avoid GitHub's unreliable *scheduled*-job queue that
  # was delaying / dropping the 4pm email. See repo README for the cron-job setup.
  repository_dispatch:
    types: [crew-location-report]
  workflow_dispatch:
    inputs:
      to:
        description: 'Override email recipients (comma-separated). Blank = default (evelin + denisse).'
        required: false
        default: ''

concurrency:
  group: crew-location
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Send crew location report
        env:
          AZUGA_API_KEY: ${{ secrets.AZUGA_API_KEY }}
          # Email-only delivery. This report is intentionally NOT posted to Teams:
          # it shares the leads webhook (TEAMS_WEBHOOK_URL), whose Power Automate
          # flow only renders adaptive-card payloads, so the plain-text crew report
          # silently failed that flow (~6/week) while still returning HTTP 202.
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          CREW_LOC_TO: ${{ github.event.inputs.to }}
        run: python scripts/crew-location.py

  notify-failure:
    needs: [report]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      workflow_name: "Crew Location Report"
    secrets: inherit
