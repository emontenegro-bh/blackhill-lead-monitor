name: Weekly SEO Audit

on:
  schedule:
    # Monday 8:00 AM CST = 14:00 UTC
    - cron: '0 14 * * 1'
  workflow_dispatch: {}

concurrency:
  group: seo-audit-weekly
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run SEO audit
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/seo-audit.py

      - name: Commit audit reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude/reports/marketing/seo/weekly/*.md .claude/reports/marketing/seo/weekly/*.json || true
          git diff --staged --quiet || git commit -m "Weekly SEO audit - $(date +%Y-%m-%d)"
          git pull --rebase || true
          git push

  notify-failure:
    needs: [audit]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      workflow_name: "Weekly SEO Audit"
    secrets: inherit
