name: Weekly SEO Audit

on:
  schedule:
    # Monday 8:00 AM CST = 14:00 UTC
    - cron: '0 14 * * 1'
  workflow_dispatch: {}

concurrency:
  group: seo-audit-weekly
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run SEO audit
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/seo-audit.py

      - name: Commit audit reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude/reports/marketing/seo/weekly/*.md .claude/reports/marketing/seo/weekly/*.json || true
          if git diff --staged --quiet; then
            echo "No audit changes to commit."
            exit 0
          fi
          git commit -m "Weekly SEO audit - $(date +%Y-%m-%d)"
          # main races with state-file bots; retry rebase+push before failing
          # (see feedback_lead_monitor_push_rebase).
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              echo "Pushed on attempt $i."
              exit 0
            fi
            echo "Push attempt $i lost the race; retrying..."
            sleep 5
          done
          echo "ERROR: could not push after 5 attempts."
          exit 1

  notify-failure:
    needs: [audit]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      workflow_name: "Weekly SEO Audit"
    secrets: inherit
