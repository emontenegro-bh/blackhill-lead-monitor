name: Weekly Local SEO Health Check

on:
  schedule:
    # Monday 7:30 AM CST = 13:30 UTC
    - cron: '30 13 * * 1'
  workflow_dispatch: {}

concurrency:
  group: seo-health-weekly
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests google-auth google-auth-oauthlib google-api-python-client

      - name: Generate and send weekly SEO health check
        env:
          GSC_CLIENT_ID: ${{ secrets.GSC_CLIENT_ID }}
          GSC_CLIENT_SECRET: ${{ secrets.GSC_CLIENT_SECRET }}
          GSC_REFRESH_TOKEN: ${{ secrets.GSC_REFRESH_TOKEN }}
          GSC_SITE_URL: "sc-domain:blackhilllandscaping.com"
          GBP_CLIENT_ID: ${{ secrets.GBP_CLIENT_ID }}
          GBP_CLIENT_SECRET: ${{ secrets.GBP_CLIENT_SECRET }}
          GBP_REFRESH_TOKEN: ${{ secrets.GBP_REFRESH_TOKEN }}
          GBP_LOCATION_ID: ${{ secrets.GBP_LOCATION_ID }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/seo-health-weekly.py

      - name: Commit report and history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude/reports/marketing/seo/weekly/health-*.md .claude/reports/marketing/seo/weekly/seo-health-history.json || true
          git diff --staged --quiet || git commit -m "Weekly Local SEO Health Check - $(date +%Y-%m-%d)"
          git pull --rebase || true
          git push

  notify-failure:
    needs: [report]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      workflow_name: "Weekly Local SEO Health Check"
    secrets: inherit
