name: Email Lead Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

concurrency:
  group: email-lead-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install msal

      - name: Poll email for leads
        env:
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
          MS_USER_EMAIL: ${{ secrets.MS_USER_EMAIL }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          LEAD_RECIPIENTS: ${{ secrets.LEAD_RECIPIENTS }}
          SPAM_RECIPIENTS: ${{ secrets.SPAM_RECIPIENTS }}
          NOTIFY_FROM_EMAIL: ${{ secrets.NOTIFY_FROM_EMAIL }}
          AUTO_REPLY_FROM: ${{ secrets.AUTO_REPLY_FROM }}
          MAILCHIMP_API_KEY: ${{ secrets.MAILCHIMP_API_KEY }}
          MAILCHIMP_SERVER: ${{ secrets.MAILCHIMP_SERVER }}
          MAILCHIMP_LIST_ID: ${{ secrets.MAILCHIMP_LIST_ID }}
          HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
          ASPIRE_CLIENT_ID: ${{ secrets.ASPIRE_CLIENT_ID }}
          ASPIRE_SECRET: ${{ secrets.ASPIRE_SECRET }}
          SPAM_AUTO_FILTER: "true"
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: python scripts/lead-monitor.py

      - name: Persist state
        if: always()
        run: |
          git config user.name "Email Lead Monitor Bot"
          git config user.email "noreply@blackhilltx.com"
          git add data/processed-state.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "Update email lead monitor state"
            for i in 1 2 3; do
              git pull --rebase origin main || true
              git push && break || sleep 2
            done
          fi

  notify-failure:
    needs: [monitor]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      workflow_name: "Email Lead Monitor"
    secrets: inherit
