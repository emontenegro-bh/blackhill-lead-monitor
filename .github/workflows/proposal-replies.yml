name: Proposal Replies

on:
  schedule:
    - cron: '*/3 * * * *'
  workflow_dispatch: {}

concurrency:
  group: proposal-replies
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  check-replies:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check and process proposal replies
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROPOSAL_RECIPIENT: ${{ secrets.PROPOSAL_RECIPIENT }}
        run: python scripts/check-proposal-replies.py

      - name: Persist reply state
        if: always()
        run: |
          if [ -f data/proposal-reply-state.json ]; then
            git config user.name "Proposal Reply Bot"
            git config user.email "noreply@blackhilltx.com"
            git add data/proposal-reply-state.json
            if ! git diff --cached --quiet; then
              git commit -m "Update proposal reply state"
              for i in 1 2 3; do
                git pull --rebase origin main || true
                git push && break || sleep 2
              done
            fi
          fi
