name: Proposal Pipeline

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      project_id:
        description: 'Process a specific CompanyCam project ID'
        required: false
      dry_run:
        description: 'Run without sending emails or saving state'
        type: boolean
        default: false

concurrency:
  group: proposal-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run proposal pipeline
        env:
          COMPANYCAM_TOKEN: ${{ secrets.COMPANYCAM_TOKEN }}
          COMPANYCAM_CREATOR_ID: '3069835'
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PROPOSAL_RECIPIENT: ${{ secrets.PROPOSAL_RECIPIENT }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          if [ -n "${{ inputs.project_id }}" ]; then
            ARGS="$ARGS --project ${{ inputs.project_id }}"
          fi
          python scripts/proposal-pipeline.py $ARGS

      - name: Persist pipeline state
        if: always()
        run: |
          if [ -f data/proposal-state.json ]; then
            git config user.name "Proposal Pipeline Bot"
            git config user.email "noreply@blackhilltx.com"
            git add data/proposal-state.json
            if ! git diff --cached --quiet; then
              git commit -m "Update proposal pipeline state"
              for i in 1 2 3; do
                git pull --rebase origin main || true
                if git push; then break; fi
                sleep 2
              done
            fi
          fi

  notify-failure:
    needs: [pipeline]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      workflow_name: "Proposal Pipeline"
    secrets: inherit
