name: GBP Photo Reminder

on:
  schedule:
    # Sunday 10:00 AM CST = 16:00 UTC
    - cron: '0 16 * * 0'
  workflow_dispatch: {}

jobs:
  reminder:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4

      - name: Send photo reminder
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: python scripts/gbp-photo-reminder.py

  notify-failure:
    needs: [reminder]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      workflow_name: "GBP Photo Reminder"
    secrets: inherit
