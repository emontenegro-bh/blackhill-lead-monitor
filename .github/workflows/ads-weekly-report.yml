name: Weekly Google Ads Report

on:
  schedule:
    # Sunday 9:07 AM CST = 15:07 UTC (off-:00 to avoid GH Actions cron drops)
    - cron: '7 15 * * 0'
  workflow_dispatch: {}

concurrency:
  group: ads-weekly-report
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-ads

      - name: Generate and send weekly report
        env:
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ASPIRE_REPORTING_CLIENT_ID: ${{ secrets.ASPIRE_REPORTING_CLIENT_ID }}
          ASPIRE_REPORTING_SECRET: ${{ secrets.ASPIRE_REPORTING_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/ads-weekly-report.py

      - name: Commit weekly report archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude/reports/marketing/google-ads/weekly/*.md .claude/reports/marketing/google-ads/weekly/*.json || true
          if git diff --staged --quiet; then
            echo "No report changes to commit."
            exit 0
          fi
          git commit -m "Weekly Google Ads report - $(date +%Y-%m-%d)"
          # main races with state-file bots; retry rebase+push before failing
          # (see feedback_lead_monitor_push_rebase).
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              echo "Pushed on attempt $i."
              exit 0
            fi
            echo "Push attempt $i lost the race; retrying..."
            sleep 5
          done
          echo "ERROR: could not push after 5 attempts."
          exit 1

  notify-failure:
    needs: [report]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      workflow_name: "Weekly Google Ads Report"
    secrets: inherit
