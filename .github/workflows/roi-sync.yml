name: ROI Sync (Aspire → WhatConverts)

on:
  schedule:
    - cron: '15,45 * * * *'
  workflow_dispatch: {}

concurrency:
  group: roi-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Sync Aspire opportunity status to WhatConverts
        env:
          WC_API_TOKEN: ${{ secrets.WC_API_TOKEN }}
          WC_API_SECRET: ${{ secrets.WC_API_SECRET }}
          WC_PROFILE_ID: ${{ secrets.WC_PROFILE_ID }}
          ASPIRE_REPORTING_CLIENT_ID: ${{ secrets.ASPIRE_REPORTING_CLIENT_ID }}
          ASPIRE_REPORTING_SECRET: ${{ secrets.ASPIRE_REPORTING_SECRET }}
        run: python scripts/whatconverts-roi-sync.py

      - name: Persist sync state
        if: always()
        run: |
          git config user.name "ROI Sync Bot"
          git config user.email "noreply@blackhilltx.com"
          git add data/processed-state.json 2>/dev/null || true
          git add data/roi-sync-state.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "Update ROI sync state"
            for i in 1 2 3; do
              git pull --rebase origin main || true
              git push && break || sleep 2
            done
          fi

  notify-failure:
    needs: [sync]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      workflow_name: "ROI Sync"
    secrets: inherit
