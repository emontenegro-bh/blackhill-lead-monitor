name: GBP Review Monitor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

concurrency:
  group: gbp-review-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-auth google-auth-httplib2 google-api-python-client requests

      - name: Poll for new reviews
        env:
          GBP_CLIENT_ID: ${{ secrets.GBP_CLIENT_ID }}
          GBP_CLIENT_SECRET: ${{ secrets.GBP_CLIENT_SECRET }}
          GBP_REFRESH_TOKEN: ${{ secrets.GBP_REFRESH_TOKEN }}
          GBP_ACCOUNT_ID: ${{ secrets.GBP_ACCOUNT_ID }}
          GBP_LOCATION_ID: ${{ secrets.GBP_LOCATION_ID }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
          MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
          MS_USER_EMAIL: ${{ secrets.MS_USER_EMAIL }}
        run: python scripts/gbp-review-monitor.py

      - name: Persist GBP state
        if: always()
        run: |
          git config user.name "GBP Monitor Bot"
          git config user.email "noreply@blackhilltx.com"
          git add data/gbp/ 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "Update GBP review state"
            for i in 1 2 3; do
              git pull --rebase origin main || true
              git push && break || sleep 2
            done
          fi

  notify-failure:
    needs: [monitor]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      workflow_name: "GBP Review Monitor"
    secrets: inherit
