name: Reply Pipeline

on:
  schedule:
    - cron: '*/3 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Detect and classify only, no responses sent'
        type: boolean
        default: false
      reset_date:
        description: 'Reset search-since date to now (skip historical)'
        type: boolean
        default: false

concurrency:
  group: reply-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run reply pipeline
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROPOSAL_RECIPIENT: ${{ secrets.PROPOSAL_RECIPIENT }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          if [ "${{ inputs.reset_date }}" = "true" ]; then
            python scripts/reply-pipeline.py --reset-date
          fi
          python scripts/reply-pipeline.py $ARGS

      - name: Persist reply state
        if: always()
        run: |
          if [ -f data/reply-pipeline-state.json ]; then
            git config user.name "Reply Pipeline Bot"
            git config user.email "noreply@blackhilltx.com"
            git add data/reply-pipeline-state.json
            if ! git diff --cached --quiet; then
              git commit -m "Update reply pipeline state"
              for i in 1 2 3; do
                git pull --rebase origin main || true
                if git push; then break; fi
                sleep 2
              done
            fi
          fi

  notify-failure:
    needs: [pipeline]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      workflow_name: "Reply Pipeline"
    secrets: inherit
