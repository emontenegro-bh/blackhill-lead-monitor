name: Managed Agent Hello

# Manual-only for now. This is the onboarding verification workflow.
# Once the Weekly Ops Analyst is wired to real data, swap this for a
# scheduled workflow (or add a schedule block).

on:
  workflow_dispatch:
    inputs:
      bootstrap:
        description: 'Run bootstrap first (creates agent + environment if missing)'
        type: boolean
        default: true
      prompt:
        description: 'Custom prompt to send to the agent (optional)'
        required: false
        type: string

concurrency:
  group: managed-agent-hello
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  hello:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install 'anthropic>=0.96.0'

      - name: Bootstrap agent + environment (if requested)
        if: ${{ inputs.bootstrap }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/managed-agent-bootstrap.py

      - name: Run hello session
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ inputs.prompt }}" ]; then
            python scripts/managed-agent-hello.py --prompt "${{ inputs.prompt }}"
          else
            python scripts/managed-agent-hello.py
          fi

      - name: Persist agent/env IDs
        if: always()
        run: |
          if [ -f data/managed-agent-ids.json ]; then
            git config user.name "Managed Agent Bot"
            git config user.email "noreply@blackhilltx.com"
            git add data/managed-agent-ids.json
            if ! git diff --cached --quiet; then
              git commit -m "Persist managed agent IDs from bootstrap"
              for i in 1 2 3; do
                git pull --rebase origin main || true
                if git push; then break; fi
                sleep 2
              done
            fi
          fi

  notify-failure:
    needs: [hello]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      workflow_name: "Managed Agent Hello"
    secrets: inherit
