name: Lead Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

concurrency:
  group: lead-monitor
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run WhatConverts lead monitor
        env:
          WC_API_TOKEN: ${{ secrets.WC_API_TOKEN }}
          WC_API_SECRET: ${{ secrets.WC_API_SECRET }}
          WC_PROFILE_ID: ${{ secrets.WC_PROFILE_ID }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          LEAD_RECIPIENTS: ${{ secrets.LEAD_RECIPIENTS }}
          SPAM_RECIPIENTS: ${{ secrets.SPAM_RECIPIENTS }}
          NOTIFY_FROM_EMAIL: ${{ secrets.NOTIFY_FROM_EMAIL }}
          AUTO_REPLY_FROM: ${{ secrets.AUTO_REPLY_FROM }}
          HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
          ASPIRE_CLIENT_ID: ${{ secrets.ASPIRE_CLIENT_ID }}
          ASPIRE_SECRET: ${{ secrets.ASPIRE_SECRET }}
        run: python scripts/whatconverts-lead-monitor.py

      - name: Persist processed state
        if: always()
        run: |
          if [ -f data/processed-state.json ]; then
            git config user.name "Lead Monitor Bot"
            git config user.email "noreply@blackhilltx.com"
            git add data/processed-state.json data/roi-sync-state.json 2>/dev/null
            if ! git diff --cached --quiet; then
              git pull --rebase origin main || true
              git commit -m "Update processed state"
              git push || true
            fi
          fi
