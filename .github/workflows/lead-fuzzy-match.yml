name: Lead Fuzzy Match

on:
  schedule:
    # Daily 7:00 AM CST = 13:00 UTC
    - cron: '0 13 * * *'
  workflow_dispatch: {}

concurrency:
  group: lead-fuzzy-match
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  match:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run fuzzy matching
        env:
          ASPIRE_CLIENT_ID: ${{ secrets.ASPIRE_CLIENT_ID }}
          ASPIRE_SECRET: ${{ secrets.ASPIRE_SECRET }}
          WC_API_TOKEN: ${{ secrets.WC_API_TOKEN }}
          WC_API_SECRET: ${{ secrets.WC_API_SECRET }}
          WC_PROFILE_ID: ${{ secrets.WC_PROFILE_ID }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: python scripts/lead-fuzzy-match.py --auto-link

      - name: Persist updated mappings
        if: always()
        run: |
          git config user.name "Lead Matcher Bot"
          git config user.email "noreply@blackhilltx.com"
          git add data/processed-state.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "Update lead mappings (fuzzy match)"
            for i in 1 2 3; do
              git pull --rebase origin main || true
              git push && break || sleep 2
            done
          fi

  notify-failure:
    needs: [match]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      workflow_name: "Lead Fuzzy Match"
    secrets: inherit
