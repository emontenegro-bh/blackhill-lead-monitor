name: Google Ads Add Keywords

on:
  workflow_dispatch:
    inputs:
      keywords:
        description: >
          JSON array of objects with {keyword_text, match_type, campaign_name,
          ad_group_name, final_url}
        required: true
        type: string
      dry_run:
        description: 'If true, print what would be added without making changes'
        required: false
        type: boolean
        default: true

concurrency:
  group: ads-add-keywords
  cancel-in-progress: false

jobs:
  add-keywords:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-ads

      - name: Add keywords to Google Ads
        env:
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          KEYWORDS_JSON: ${{ inputs.keywords }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: python scripts/ads-add-keywords.py

  notify-failure:
    needs: [add-keywords]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      workflow_name: "Google Ads Add Keywords"
    secrets: inherit
