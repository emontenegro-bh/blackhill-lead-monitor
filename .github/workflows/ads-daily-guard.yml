name: Google Ads Daily Guard

on:
  schedule:
    # Daily 7:07 AM CDT = 12:07 UTC (off-:00 to avoid GH Actions cron drops)
    - cron: '7 12 * * *'
  workflow_dispatch: {}

concurrency:
  group: ads-daily-guard
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-ads

      - name: Run daily guard
        env:
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/ads-daily-guard.py

      - name: Commit guard state snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude/states/ads-guard-state.json || true
          git diff --staged --quiet || git commit -m "Ads guard snapshot - $(date +%Y-%m-%d)"
          git pull --rebase || true
          git push

  notify-failure:
    needs: [guard]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      workflow_name: "Google Ads Daily Guard"
    secrets: inherit
