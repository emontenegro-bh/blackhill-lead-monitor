name: Google Ads Daily Guard

on:
  schedule:
    # Daily 7:07 AM CDT = 12:07 UTC (off-:00 to avoid GH Actions cron drops)
    - cron: '7 12 * * *'
  workflow_dispatch: {}

concurrency:
  group: ads-daily-guard
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-ads

      - name: Run daily guard
        env:
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/ads-daily-guard.py

      - name: Commit guard state snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude/states/ads-guard-state.json || true
          if git diff --staged --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "Ads guard snapshot - $(date +%Y-%m-%d)"
          # This repo's main races with state-file bots every few minutes; the push
          # can lose the race in the gap between rebase and push. Retry the
          # rebase+push loop before failing (see feedback_lead_monitor_push_rebase).
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              echo "Pushed guard state on attempt $i."
              exit 0
            fi
            echo "Push attempt $i lost the race; retrying..."
            sleep 5
          done
          echo "ERROR: could not push guard state after 5 attempts."
          exit 1

  notify-failure:
    needs: [guard]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      workflow_name: "Google Ads Daily Guard"
    secrets: inherit
