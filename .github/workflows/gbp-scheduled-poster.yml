name: GBP Scheduled Poster

on:
  schedule:
    # Run at 11:00 AM CDT (16:00 UTC) on Mon, Wed, Fri
    - cron: '0 16 * * 1,3,5'
  workflow_dispatch: {}

concurrency:
  group: gbp-scheduled-poster
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-auth google-auth-httplib2 google-api-python-client requests

      - name: Post scheduled GBP content
        env:
          GBP_CLIENT_ID: ${{ secrets.GBP_CLIENT_ID }}
          GBP_CLIENT_SECRET: ${{ secrets.GBP_CLIENT_SECRET }}
          GBP_REFRESH_TOKEN: ${{ secrets.GBP_REFRESH_TOKEN }}
          GBP_ACCOUNT_ID: ${{ secrets.GBP_ACCOUNT_ID }}
          GBP_LOCATION_ID: ${{ secrets.GBP_LOCATION_ID }}
        run: python scripts/gbp-scheduled-poster.py

      - name: Persist post state
        if: always()
        run: |
          git config user.name "GBP Poster Bot"
          git config user.email "noreply@blackhilltx.com"
          git add data/gbp/scheduled-posts/ 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "Update GBP post queue state"
            for i in 1 2 3; do
              git pull --rebase origin main || true
              git push && break || sleep 2
            done
          fi

  notify-failure:
    needs: [post]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      workflow_name: "GBP Scheduled Poster"
    secrets: inherit
